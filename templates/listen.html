<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tradutor ao Vivo</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    header {
      text-align: center;
    }
    header h1 { font-size: 1.3rem; font-weight: 600; }
    header p  { font-size: 0.82rem; color: #8b949e; margin-top: 0.25rem; }

    #statusBadge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 0.35rem 0.85rem;
      font-size: 0.78rem;
      color: #8b949e;
    }
    #dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #8b949e;
      transition: background 0.3s;
    }
    #dot.live { background: #f85149; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.25; } }

    #feed {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1rem 1.1rem;
      animation: fadeIn 0.35s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } }

    .card .original {
      font-size: 0.76rem;
      color: #8b949e;
      margin-bottom: 0.4rem;
    }
    .card .translated {
      font-size: 1.05rem;
      line-height: 1.55;
      color: #e6edf3;
    }

    .empty {
      color: #30363d;
      font-size: 0.9rem;
      text-align: center;
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Tradução ao Vivo</h1>
    <p>O áudio traduzido será reproduzido automaticamente.</p>
  </header>

  <div id="statusBadge">
    <div id="dot"></div>
    <span id="statusTxt">Aguardando...</span>
  </div>

  <div id="feed">
    <p class="empty" id="empty">Aguardando tradução...</p>
  </div>

  <script>
    const socket = io();

    socket.on('connect', () => setStatus('Conectado', false));
    socket.on('disconnect', () => setStatus('Desconectado', false));

    socket.on('translation', ({ original, translated, audio }) => {
      setStatus('Ao vivo', true);
      addCard(original, translated);
      playAudio(audio);
    });

    function setStatus(msg, live) {
      document.getElementById('statusTxt').textContent = msg;
      document.getElementById('dot').classList.toggle('live', live);
    }

    function addCard(original, translated) {
      document.getElementById('empty')?.remove();
      const feed = document.getElementById('feed');
      const c = document.createElement('div');
      c.className = 'card';
      c.innerHTML = `
        <div class="original">${esc(original)}</div>
        <div class="translated">${esc(translated)}</div>
      `;
      feed.prepend(c);
      // Limitar a 30 cards visibles
      while (feed.children.length > 30) feed.lastChild.remove();
    }

    function playAudio(b64) {
      const a = new Audio('data:audio/mp3;base64,' + b64);
      a.play().catch(() => {});
    }

    function esc(t) {
      return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
