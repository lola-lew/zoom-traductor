<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tradução ao Vivo</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      gap: 1.5rem;
    }

    header { text-align: center; }
    header h1 { font-size: 1.3rem; font-weight: 600; }
    header p  { font-size: 0.82rem; color: #8b949e; margin-top: 0.25rem; }

    #connectBtn {
      padding: 0.75rem 2rem;
      background: #2f81f7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.2s;
    }
    #connectBtn:hover { filter: brightness(1.15); }
    #connectBtn:disabled { opacity: 0.45; cursor: not-allowed; }
    #connectBtn.connected { background: #3fb950; cursor: default; }

    #statusBadge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 0.35rem 0.85rem;
      font-size: 0.78rem;
      color: #8b949e;
    }
    #dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #8b949e;
      transition: background 0.3s;
    }
    #dot.live { background: #f85149; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0.25; } }

    #feed {
      width: 100%;
      max-width: 680px;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 1rem 1.1rem;
      animation: fadeIn 0.35s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } }

    .card .original {
      font-size: 0.76rem;
      color: #8b949e;
      margin-bottom: 0.4rem;
    }
    .card .translated {
      font-size: 1.05rem;
      line-height: 1.55;
      color: #e6edf3;
    }

    .empty {
      color: #30363d;
      font-size: 0.9rem;
      text-align: center;
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Tradução ao Vivo</h1>
    <p>Pressione o botão para ativar o áudio e começar a ouvir.</p>
  </header>

  <button id="connectBtn" onclick="connect()">🔊 Conectar e ouvir</button>

  <div id="statusBadge">
    <div id="dot"></div>
    <span id="statusTxt">Aguardando...</span>
  </div>

  <div id="feed">
    <p class="empty" id="empty">Aguardando tradução...</p>
  </div>

  <script>
    let audioCtx   = null;
    let connected  = false;
    let socket     = null;
    // Cola de chunks MP3 base64 que llegaron antes de que el usuario conecte
    const audioQueue = [];

    function connect() {
      if (connected) return;
      connected = true;

      // Crear AudioContext con gesto de usuario — desbloquea autoplay en todos los browsers
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      const btn = document.getElementById('connectBtn');
      btn.textContent = '✓ Conectado';
      btn.classList.add('connected');
      btn.disabled = true;

      setStatus('Conectado', false);

      // Conectar SocketIO ahora que tenemos AudioContext
      socket = io();
      socket.on('connect',    () => setStatus('Conectado', false));
      socket.on('disconnect', () => setStatus('Desconectado', false));

      socket.on('translation', ({ original, translated }) => {
        setStatus('Ao vivo', true);
        addCard(original, translated);
      });

      socket.on('audio', ({ data }) => {
        playMp3(data);
      });

      // Vaciar cola de audio que pudo haber llegado antes
      while (audioQueue.length) playMp3(audioQueue.shift());
    }

    async function playMp3(b64) {
      if (!audioCtx) {
        // Si el usuario aún no conectó, encolar
        audioQueue.push(b64);
        return;
      }
      try {
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        const binary = atob(b64);
        const bytes  = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const audioBuffer = await audioCtx.decodeAudioData(bytes.buffer);
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioCtx.destination);
        source.start();
      } catch (e) {
        console.warn('[listen] playMp3 error:', e.message);
      }
    }

    function setStatus(msg, live) {
      document.getElementById('statusTxt').textContent = msg;
      document.getElementById('dot').classList.toggle('live', live);
    }

    function addCard(original, translated) {
      document.getElementById('empty')?.remove();
      const feed = document.getElementById('feed');
      const c = document.createElement('div');
      c.className = 'card';
      c.innerHTML = `
        <div class="original">${esc(original)}</div>
        <div class="translated">${esc(translated)}</div>
      `;
      feed.prepend(c);
      while (feed.children.length > 30) feed.lastChild.remove();
    }

    function esc(t) {
      return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
