<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      padding: 16px;
    }
    h2 {
      font-size: 0.82rem;
      color: #8b949e;
      font-weight: 500;
      margin-bottom: 14px;
      letter-spacing: .03em;
    }
    label {
      display: block;
      font-size: 0.68rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 0.78rem;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus { border-color: #2f81f7; }
    #btn {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      background: #2f81f7;
      color: #fff;
      transition: filter 0.15s;
    }
    #btn:hover:not(:disabled) { filter: brightness(1.15); }
    #btn.stop { background: #f85149; }
    #btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #status {
      margin-top: 10px;
      font-size: 0.72rem;
      color: #8b949e;
      min-height: 16px;
      line-height: 1.4;
    }
    #status.ok  { color: #3fb950; }
    #status.err { color: #f85149; }
  </style>
</head>
<body>
  <h2>Zoom Tradutor — Captura de audio</h2>
  <label>Servidor (Railway)</label>
  <input id="serverUrl" type="text" value="wss://web-production-a6d81.up.railway.app" />
  <button id="btn">Iniciar captura</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
